name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y cmake clang

      - name: Configure
        run: cmake --preset default

      - name: Build
        run: cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure
